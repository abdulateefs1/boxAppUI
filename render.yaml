# Repo ildizi: boxAppUI/ — asosiy kod box-sistema-v31-main ichida
services:
  - type: web
    name: box-sistema
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: box-sistema-v31-main
    buildCommand: npm install --prefix backend && npm run build --prefix backend
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://app.andbillur.com
      - key: DATABASE_URL
        fromDatabase:
          name: boxapp-db
          property: connectionString

databases:
  - name: boxapp-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: 16
