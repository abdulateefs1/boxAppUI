services:
  - type: web
    name: box-sistema
    env: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://app.andbillur.com
      - key: DATABASE_URL
        fromDatabase:
          name: boxapp-db
          property: connectionString

databases:
  - name: boxapp-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: 16
